<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>LinkSnap</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f0f4f8; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; }
    h1 { font-size: 2rem; color: #1a202c; margin-bottom: 8px; }
    p.sub { color: #718096; margin-bottom: 32px; }
    .card { background: white; border-radius: 12px; padding: 28px; width: 100%; max-width: 560px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); margin-bottom: 24px; }
    input { width: 100%; padding: 12px 16px; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 1rem; margin-bottom: 12px; outline: none; }
    input:focus { border-color: #667eea; }
    button { width: 100%; padding: 12px; background: #667eea; color: white; border: none; border-radius: 8px; font-size: 1rem; cursor: pointer; font-weight: 600; }
    button:hover { background: #5a67d8; }
    .result { margin-top: 16px; padding: 12px 16px; background: #ebf8ff; border-radius: 8px; color: #2b6cb0; font-size: 0.95rem; display: none; }
    .result a { color: #2b6cb0; font-weight: 600; }
    table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
    th { text-align: left; padding: 10px 8px; color: #718096; border-bottom: 2px solid #e2e8f0; }
    td { padding: 10px 8px; border-bottom: 1px solid #f7fafc; color: #2d3748; }
    td a { color: #667eea; text-decoration: none; }
    .badge { background: #ebf4ff; color: #3b82f6; padding: 2px 8px; border-radius: 99px; font-size: 0.8rem; font-weight: 600; }
    h2 { font-size: 1.1rem; color: #1a202c; margin-bottom: 16px; }
  </style>
</head>
<body>
  <h1>⚡ LinkSnap using cicd</h1>
  <p class="sub">Shorten URLs and track clicks — hosted on AWS ECS</p>

  <div class="card">
    <input type="url" id="urlInput" placeholder="Paste your long URL here..." />
    <button onclick="shorten()">Shorten URL</button>
    <div class="result" id="result"></div>
  </div>

  <div class="card">
    <h2>📊 All Links</h2>
    <table>
      <thead><tr><th>Short URL</th><th>Original</th><th>Clicks</th></tr></thead>
      <tbody id="linksTable"><tr><td colspan="3" style="color:#a0aec0">Loading...</td></tr></tbody>
    </table>
  </div>

  <script>
    const API = "/api";

    async function shorten() {
      const url = document.getElementById("urlInput").value.trim();
      if (!url) return alert("Please enter a URL");
      const res = await fetch(`${API}/shorten`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ url })
      });
      const data = await res.json();
      const result = document.getElementById("result");
      result.style.display = "block";
      result.innerHTML = `✅ Short URL: <a href="${data.short_url}" target="_blank">${window.location.origin}${data.short_url}</a>`;
      document.getElementById("urlInput").value = "";
      loadLinks();
    }

    async function loadLinks() {
      const res = await fetch(`${API}/links`);
      const links = await res.json();
      const tbody = document.getElementById("linksTable");
      if (!links.length) { tbody.innerHTML = `<tr><td colspan="3" style="color:#a0aec0">No links yet</td></tr>`; return; }
      tbody.innerHTML = links.map(l => `
        <tr>
          <td><a href="/r/${l.short_code}" target="_blank">/r/${l.short_code}</a></td>
          <td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${l.original_url}</td>
          <td><span class="badge">${l.clicks}</span></td>
        </tr>
      `).join("");
    }

    loadLinks();
    setInterval(loadLinks, 10000);
  </script>
</body>
</html>
