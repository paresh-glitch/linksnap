name: ci

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

env:
  ECR_REGISTRY: 030635937630.dkr.ecr.ap-south-1.amazonaws.com

permissions:
  id-token: write
  contents: read


jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: setup python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: install dep
        run: |
          cd backend
          pip install -r requirements.txt
          pip install flake8
          flake8 app.py --max-line-length=120 --ignore=E302,E305,E401

  build:
    runs-on: ubuntu-latest
    needs: lint
    env:
      ENV_NAME: ${{ github.ref_name == 'main' && 'prod' || 'dev' }}
    steps:
      - uses: actions/checkout@v4

      - name: build flask image
        run: docker build -t ${{ env.ENV_NAME }}-flask-app ./backend

      - name: build nginx image
        run: docker build -t ${{ env.ENV_NAME }}-nginx ./frontend

      - name: scan docker images
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.ENV_NAME }}-flask-app
          exit-code: 0
          severity: CRITICAL

      - name: scan nginx images
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.ENV_NAME }}-nginx
          exit-code: 0
          severity: CRITICAL

      - name: Configure AWS credentials
        if: github.event_name == 'push'
        uses: aws-actions/configure-aws-credentials@v2
        with:
          role-to-assume: arn:aws:iam::030635937630:role/github-actions-role
          aws-region: ap-south-1

      - name: login to ECR
        if: github.event_name == 'push'
        uses: aws-actions/amazon-ecr-login@v1

      - name: push flask image
        if: github.event_name == 'push'
        run: |
          docker tag ${{ env.ENV_NAME }}-flask-app:latest ${{ env.ECR_REGISTRY }}/${{ env.ENV_NAME }}-flask-app:${{ github.sha }}
          docker push ${{ env.ECR_REGISTRY }}/${{ env.ENV_NAME }}-flask-app:${{ github.sha }}
      - name: push nginx image
        if: github.event_name == 'push'
        run: |
          docker tag ${{ env.ENV_NAME }}-nginx:latest ${{ env.ECR_REGISTRY }}/${{ env.ENV_NAME }}-nginx:${{ github.sha }}
          docker push ${{ env.ECR_REGISTRY }}/${{ env.ENV_NAME }}-nginx:${{ github.sha }}

    outputs:
      image_tag: ${{ github.sha }}
      env_name: ${{ env.ENV_NAME }}

